<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-vrm-component@1.0.0/dist/aframe-vrm-component.min.js"></script>

<body style="margin: 0; overflow: hidden;">
  <div id="overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; background: rgba(0,0,0,0.8); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: Arial; cursor: pointer;">
    <h1>ARTE 2F PRO</h1>
    <p>Toca para iniciar</p>
  </div>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="alpha: true; antialias: true;">
    <a-assets>
      <img id="logoImg" src="logo2fpro.png">
      <audio id="musicaFondo" src="arte2fpromusic.mpeg" preload="auto"></audio>
    </a-assets>

    <a-light type="ambient" intensity="2"></a-light>
    <a-light type="directional" position="1 1 1" intensity="1"></a-light>

    <a-entity id="avatar" vrm-model="src: ./avatar.vrm;" position="0 -1.2 -2.5" rotation="0 180 0" visible="true">
      <a-image id="logoEntidad" src="#logoImg" position="0 1.1 0.5" scale="0 0 0" visible="false" rotation="0 180 0"></a-image>
    </a-entity>
    
    <a-marker-camera preset="hiro"></a-marker-camera>
  </a-scene>

  <script>
    const overlay = document.getElementById('overlay');
    const avatar = document.querySelector('#avatar');
    const logo = document.querySelector('#logoEntidad');
    const musica = document.querySelector('#musicaFondo');

    overlay.addEventListener('click', () => {
      overlay.style.display = 'none';
      window.speechSynthesis.cancel();

      // Iniciar voz de inmediato
      const saludo = new SpeechSynthesisUtterance("Hola");
      saludo.lang = 'es-ES';
      window.speechSynthesis.speak(saludo);
      
      avatar.setAttribute('animation', "property: rotation; to: 0 160 0; dur: 800");

      setTimeout(() => {
        const h2 = new SpeechSynthesisUtterance("Soy arte dos efe pro");
        h2.lang = 'es-ES';
        window.speechSynthesis.speak(h2);
        logo.setAttribute('visible', 'true');
        logo.setAttribute('animation', "property: scale; to: 0.6 0.6 0.6; dur: 600");
        logo.setAttribute('animation__2', "property: position; to: 0 1.1 0.7; dur: 600");
      }, 2000);

      setTimeout(() => {
        musica.play();
        logo.setAttribute('visible', 'false');
        avatar.setAttribute('animation', "property: rotation; from: 0 180 0; to: 0 540 0; dur: 3000; loop: true; easing: linear");
      }, 6000);
    });
  </script>
</body>
