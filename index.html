<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
  .controls {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px; z-index: 100;
  }
  button {
    padding: 12px; border-radius: 8px; border: none; background: #007bff;
    color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
  }
  button:active { background: #0056b3; }
</style>

<body style="margin: 0; overflow: hidden;">
  <div class="controls">
    <button onclick="saludar()">1. Hola</button>
    <button onclick="mostrarLogo()">2. Logo</button>
    <button onclick="presentar()">3. Soy Arte2F</button>
    <button onclick="bailar()">4. Bailar!</button>
  </div>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="alpha: true;">
    <a-assets>
      <a-asset-item id="modelo" src="avatar.glb"></a-asset-item>
      <img id="logoImg" src="logo2fpro.png">
      <audio id="musica" src="arte2fpromusic.mpeg"></audio>
    </a-assets>

    <a-light type="ambient" intensity="1.8"></a-light>
    
    <a-entity id="avatar" gltf-model="#modelo" position="0 -1.2 -3" rotation="0 180 0" scale="0.4 0.4 0.4">
      <a-image id="logo" src="#logoImg" position="0.3 1.5 0.2" scale="0 0 0" visible="false" rotation="0 180 0"></a-image>
    </a-entity>
    
    <a-marker-camera preset="hiro"></a-marker-camera>
  </a-scene>

  <script>
    const avatar = document.querySelector('#avatar');
    const logo = document.querySelector('#logo');
    const musica = document.querySelector('#musica');

    function saludar() {
      const h = new SpeechSynthesisUtterance("Hola");
      h.lang = 'es-ES';
      window.speechSynthesis.speak(h);
      avatar.setAttribute('animation', "property: rotation; to: 0 160 0; dur: 800");
    }

    function mostrarLogo() {
      logo.setAttribute('visible', 'true');
      logo.setAttribute('animation__s', "property: scale; to: 1.2 1.2 1.2; dur: 600");
      logo.setAttribute('animation__m', "property: position; to: 0 2.2 1.2; dur: 800");
    }

    function presentar() {
      const h = new SpeechSynthesisUtterance("Hola, soy arte dos efe pro");
      h.lang = 'es-ES';
      window.speechSynthesis.speak(h);
      logo.setAttribute('animation__l', "property: position; to: 1.5 2.2 0.5; dur: 1000");
      avatar.setAttribute('animation__r', "property: rotation; to: 0 200 0; dur: 1000");
    }

    function bailar() {
      // Regresa al bolsillo primero
      logo.setAttribute('animation__b', "property: position; to: 0.3 1.5 0.2; dur: 600");
      logo.setAttribute('animation__h', "property: scale; to: 0 0 0; dur: 600");
      
      setTimeout(() => {
        logo.setAttribute('visible', 'false');
        musica.play();
        avatar.setAttribute('animation__d', "property: rotation; from: 0 180 0; to: 0 540 0; dur: 3000; loop: true; easing: linear");
      }, 700);
    }
  </script>
</body>
