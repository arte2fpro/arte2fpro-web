<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
<script src="https://unpkg.com/aframe-vrm-component@1.0.0/dist/aframe-vrm-component.min.js"></script>

<body style="margin: 0; overflow: hidden;">
  <div id="overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; background: rgba(0,0,0,0.8); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: Arial; cursor: pointer;">
    <h1>ARTE 2F PRO</h1>
    <p>Toca la pantalla para comenzar</p>
  </div>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    <a-assets>
      <img id="logoImg" src="logo2fpro.png">
      <audio id="musicaFondo" src="arte2fpromusic.mpeg" preload="auto"></audio>
    </a-assets>

    <a-entity id="avatar" vrm-model="src: avatar.vrm;" position="0 0 -3" rotation="0 180 0">
      <a-image id="logoEntidad" src="#logoImg" position="0.3 -0.5 0.1" scale="0 0 0" visible="false"></a-image>
    </a-entity>
    
    <a-marker-camera preset="hiro"></a-marker-camera>
  </a-scene>

  <script>
    const overlay = document.getElementById('overlay');
    const avatar = document.querySelector('#avatar');
    const logo = document.querySelector('#logoEntidad');
    const musica = document.querySelector('#musicaFondo');

    // Asegurarnos de que la música esté pausada al inicio
    musica.pause();
    musica.currentTime = 0;

    overlay.addEventListener('click', () => {
      overlay.style.display = 'none';
      
      // Reiniciar cualquier sonido por si acaso
      window.speechSynthesis.cancel();

      // 1. SALUDO CON VOZ Y MOVIMIENTO (Inmediato)
      const saludo = new SpeechSynthesisUtterance("Hola");
      saludo.lang = 'es-ES';
      saludo.rate = 0.9;
      window.speechSynthesis.speak(saludo);
      
      // Movimiento de saludo
      avatar.setAttribute('animation', "property: rotation; to: 0 150 0; dur: 1000");

      // 2. SACA EL LOGO Y SE PRESENTA (A los 2 segundos)
      setTimeout(() => {
        const presentacion = new SpeechSynthesisUtterance("Soy arte dos efe pro");
        presentacion.lang = 'es-ES';
        window.speechSynthesis.speak(presentacion);
        
        logo.setAttribute('visible', 'true');
        logo.setAttribute('animation', "property: scale; to: 0.7 0.7 0.7; dur: 600");
        logo.setAttribute('animation__2', "property: position; to: 0 1.2 0.7; dur: 600");
      }, 2000);

      // 3. PONE LA MANO DE LADO (A los 4 segundos)
      setTimeout(() => {
        avatar.setAttribute('animation', "property: rotation; to: 0 210 0; dur: 800");
        logo.setAttribute('animation__3', "property: position; to: 0.6 1.2 0.3; dur: 800");
      }, 4000);

      // 4. GUARDA LOGO Y EMPIEZA MÚSICA/BAILE (A los 6 segundos)
      setTimeout(() => {
        logo.setAttribute('visible', 'false');
        musica.play(); // LA MÚSICA SOLO EMPIEZA AQUÍ
        avatar.setAttribute('animation', "property: rotation; from: 0 180 0; to: 0 540 0; dur: 3000; loop: true; easing: linear");
      }, 6500);
    });
  </script>
</body>
