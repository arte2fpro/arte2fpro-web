<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
<script src="https://unpkg.com/aframe-vrm-component@1.0.0/dist/aframe-vrm-component.min.js"></script>

<body style="margin: 0; overflow: hidden;">
  <div id="overlay" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; background: #000; color: #fff; padding: 20px; border-radius: 15px; font-family: Arial; cursor: pointer; text-align: center;">
    <h1>ARTE 2F PRO</h1>
    <p>Toca para iniciar la experiencia</p>
  </div>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    <a-assets>
      <img id="logoImg" src="logo2fpro.png">
      <audio id="musicaFondo" src="arte2fpromusic.mpeg"></audio>
    </a-assets>

    <a-entity id="avatar" vrm-model="src: avatar.vrm;" position="0 0 -3" rotation="0 180 0">
      <a-image id="logoEntidad" src="#logoImg" position="0.3 -0.5 0.1" scale="0 0 0" visible="false"></a-image>
    </a-entity>
    
    <a-marker-camera preset="hiro"></a-marker-camera>
  </a-scene>

  <script>
    const overlay = document.getElementById('overlay');
    const avatar = document.querySelector('#avatar');
    const logo = document.querySelector('#logoEntidad');
    const musica = document.querySelector('#musicaFondo');

    overlay.addEventListener('click', () => {
      overlay.style.display = 'none';
      
      // 1. DICE HOLA Y SALUDA CON LA MANO
      const h1 = new SpeechSynthesisUtterance("Hola");
      h1.lang = 'es-ES';
      window.speechSynthesis.speak(h1);
      avatar.setAttribute('animation', "property: rotation; to: 0 160 0; dur: 800");

      // 2. SACA EL LOGO DEL BOLSILLO Y LO PONE AL FRENTE
      setTimeout(() => {
        const h2 = new SpeechSynthesisUtterance("Soy arte dos efe pro");
        h2.lang = 'es-ES';
        window.speechSynthesis.speak(h2);
        
        logo.setAttribute('visible', 'true');
        logo.setAttribute('animation', "property: scale; to: 0.8 0.8 0.8; dur: 600");
        logo.setAttribute('animation__pos', "property: position; to: 0 0.8 0.5; dur: 600");
      }, 1500);

      // 3. PONE LA MANO DE LADO (MANTENIENDO EL LOGO VISIBLE)
      setTimeout(() => {
        avatar.setAttribute('animation', "property: rotation; to: 0 220 0; dur: 1000");
        logo.setAttribute('animation__side', "property: position; to: 0.7 0.8 0.2; dur: 1000");
      }, 3500);

      // 4. METE EL LOGO AL BOLSILLO DE NUEVO
      setTimeout(() => {
        logo.setAttribute('animation__hide', "property: scale; to: 0 0 0; dur: 500");
        logo.setAttribute('animation__back', "property: position; to: 0.3 -0.5 0.1; dur: 500");
      }, 5500);

      // 5. EMPIEZA LA CANCIÓN Y EL BAILE
      setTimeout(() => {
        musica.play();
        avatar.setAttribute('animation', "property: rotation; from: 0 180 0; to: 0 540 0; dur: 2000; loop: true; easing: linear");
        avatar.setAttribute('animation__jump', "property: position; from: 0 0 -3; to: 0 0.3 -3; dur: 400; loop: true; dir: alternate");
      }, 6500);
    });
  </script>
</body>
