<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
<script src="https://unpkg.com/aframe-vrm-component@1.0.0/dist/aframe-vrm-component.min.js"></script>

<body style="margin: 0; overflow: hidden;">
  <div id="overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; background: rgba(0,0,0,0.8); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: Arial; cursor: pointer; text-align: center;">
    <h1>ARTE 2F PRO</h1>
    <p>Toca para iniciar</p>
  </div>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="alpha: true; antialias: true; colorManagement: true;">
    <a-assets>
      <img id="logoImg" src="logo2fpro.png">
      <audio id="musicaFondo" src="arte2fpromusic.mpeg" preload="auto"></audio>
    </a-assets>

    <a-entity id="avatar" vrm-model="src: avatar.vrm;" position="0 -1.0 -2" rotation="0 180 0" scale="1 1 1">
      <a-image id="logoEntidad" src="#logoImg" position="0 0.8 0.4" scale="0 0 0" visible="false" rotation="0 180 0"></a-image>
    </a-entity>
    
    <a-marker-camera preset="hiro"></a-marker-camera>
  </a-scene>

  <script>
    const overlay = document.getElementById('overlay');
    const avatar = document.querySelector('#avatar');
    const logo = document.querySelector('#logoEntidad');
    const musica = document.querySelector('#musicaFondo');

    overlay.addEventListener('click', () => {
      overlay.style.display = 'none';
      window.speechSynthesis.cancel();

      // 1. SALUDO INICIAL
      const h1 = new SpeechSynthesisUtterance("Hola");
      h1.lang = 'es-ES';
      window.speechSynthesis.speak(h1);
      avatar.setAttribute('animation', "property: rotation; to: 0 150 0; dur: 800");

      // 2. MUESTRA LOGO AL DERECHO
      setTimeout(() => {
        const h2 = new SpeechSynthesisUtterance("Soy arte dos efe pro");
        h2.lang = 'es-ES';
        window.speechSynthesis.speak(h2);
        logo.setAttribute('visible', 'true');
        logo.setAttribute('animation', "property: scale; to: 0.5 0.5 0.5; dur: 600");
        logo.setAttribute('animation__pos', "property: position; to: 0 0.9 0.6; dur: 600");
      }, 2000);

      // 3. MUESTRA DE LADO
      setTimeout(() => {
        avatar.setAttribute('animation', "property: rotation; to: 0 210 0; dur: 1000");
        logo.setAttribute('animation__side', "property: position; to: 0.4 0.9 0.4; dur: 1000");
      }, 4000);

      // 4. BAILE Y MÚSICA FINAL
      setTimeout(() => {
        logo.setAttribute('visible', 'false');
        musica.play();
        avatar.setAttribute('animation', "property: rotation; from: 0 180 0; to: 0 540 0; dur: 3000; loop: true; easing: linear");
      }, 6500);
    });
  </script>
</body>
