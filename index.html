<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
  a-scene { background-color: transparent !important; }
  body { margin: 0; overflow: hidden; }
</style>

<body style="margin: 0; overflow: hidden;">
  <div id="overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; background: rgba(0,0,0,0.8); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: Arial; cursor: pointer; text-align: center;">
    <h1>ARTE 2F PRO</h1>
    <p>Toca para ver el avatar completo</p>
  </div>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="alpha: true; antialias: true;">
    <a-assets>
      <a-asset-item id="modelo" src="avatar.glb?v=2"></a-asset-item>
      <img id="logoImg" src="logo2fpro.png?v=2">
      <audio id="musicaFondo" src="arte2fpromusic.mpeg" preload="auto"></audio>
    </a-assets>

    <a-entity light="type: ambient; intensity: 1.5;"></a-entity>
    <a-entity light="type: directional; intensity: 1;" position="1 2 1"></a-entity>

    <a-entity id="avatar" gltf-model="#modelo" position="0 -1.2 -3" rotation="0 180 0" scale="0.05 0.05 0.05">
      <a-image id="logoEntidad" src="#logoImg" position="0 25 0" scale="15 15 15" visible="false" rotation="0 180 0"></a-image>
    </a-entity>
    
    <a-marker-camera preset="hiro"></a-marker-camera>
  </a-scene>

  <script>
    const overlay = document.getElementById('overlay');
    const avatar = document.querySelector('#avatar');
    const logo = document.querySelector('#logoEntidad');
    const musica = document.querySelector('#musicaFondo');

    overlay.addEventListener('click', () => {
      overlay.style.display = 'none';
      window.speechSynthesis.cancel();

      // Voz de saludo
      const h1 = new SpeechSynthesisUtterance("Hola");
      h1.lang = 'es-ES';
      window.speechSynthesis.speak(h1);
      
      // El avatar gira para que lo veas bien
      avatar.setAttribute('animation', "property: rotation; to: 0 540 0; dur: 2000");

      setTimeout(() => {
        const h2 = new SpeechSynthesisUtterance("Soy arte dos efe pro");
        h2.lang = 'es-ES';
        window.speechSynthesis.speak(h2);
        logo.setAttribute('visible', 'true');
        logo.setAttribute('animation', "property: scale; from: 0 0 0; to: 15 15 15; dur: 1000");
      }, 2500);

      setTimeout(() => {
        musica.play();
        // Baile continuo
        avatar.setAttribute('animation', "property: rotation; from: 0 180 0; to: 0 540 0; dur: 3000; loop: true; easing: linear");
      }, 6000);
    });
  </script>
</body>
